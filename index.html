<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderclap and Flash - Zenitsu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="scene-container">
        <!-- Background Layer -->
        <div class="layer bg-layer" id="bg-layer"></div>
        
        <!-- Asleep/Thunderclap Zenitsu Layer (Base) -->
        <div class="layer asleep-layer" id="asleep-layer">
            <img src="assets/zenitsu_asleep_transparent.png" alt="Zenitsu Asleep" id="zenitsu-asleep">
        </div>
        
        <!-- Canvas for Lightning Effects -->
        <canvas id="lightning-canvas"></canvas>
        
        <!-- Awake Zenitsu Layer (Top with Clip-Path) -->
        <div class="layer awake-layer" id="awake-layer">
            <img src="assets/zenitsu_awake_transparent.png" alt="Zenitsu Awake" id="zenitsu-awake">
        </div>

        <div id="divider-line"></div>

        <!-- UI Elements -->
        <div class="ui-layer">
            <h1 id="title-text">THUNDERCLAP & FLASH</h1>
            
            <div id="zenitsu-details" class="details-panel">
                <h2>Zenitsu Agatsuma</h2>
                <p><strong>Breathing Style:</strong> Thunder Breathing (雷の呼吸)</p>
                <p><strong>Form:</strong> First Form: Thunderclap and Flash (壱ノ型 霹靂一閃)</p>
                <p class="lore-text">When asleep, his fear vanishes, unleashing his true, lightning-fast potential.</p>
            </div>

            <div class="slider-hint">Drag across the screen</div>
        </div>
    </div>

    <!-- Audio Elements (Placeholders) -->
    <audio id="thunder-audio" src="assets/thunder.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
